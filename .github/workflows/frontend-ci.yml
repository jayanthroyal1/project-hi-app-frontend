name: Project Hi Frontend CI Pipeline

on:
    push:
        branches:
            - main
            - develop

    pull_request:
        branches:
            - main
            - develop

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v4

            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install Dependencies
              run: npm ci

            - name: Build Frontend
              run: npm run build
